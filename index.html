<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>רבקה חיים, יוצרת בנייר | Rivka Haim, Paper Artist</title>
<meta name="description" content="רבקה חיים, יוצרת בנייר. נייר נוזלי, פיסול, אובייקטים וסדנאות סטודיו."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300&family=Frank+Ruhl+Libre:wght@200;300;400&family=Montserrat:wght@200;300;400&family=Assistant:wght@200;300;400&display=swap" rel="stylesheet"/>
<style>
/* ══ Design tokens ══════════════════════════════════ */
:root {
  --bg:        #0b0a08;
  --bg-2:      #14110d;
  --ivory:     #f2ede3;
  --ivory-dim: rgba(242,237,227,.6);
  --ivory-ftn: rgba(242,237,227,.38);
  --gold:      #c8a468;
  --gold-dim:  rgba(200,164,104,.55);
  --hair:      rgba(242,237,227,.14);
  --veil:      linear-gradient(to bottom, rgba(6,5,4,.48), rgba(6,5,4,.16) 42%, rgba(6,5,4,.66));
  --ease:      cubic-bezier(.22,1,.36,1);
  --serif:     'Cormorant Garamond','Frank Ruhl Libre',Georgia,serif;
  --sans:      'Montserrat','Assistant',system-ui,sans-serif;
  --max:       1680px;
}

/* ══ Reset ══ */
*,::before,::after { box-sizing:border-box; margin:0; padding:0; border:0 solid var(--hair); }
html { line-height:1.5; -webkit-text-size-adjust:100%; scroll-behavior:smooth; overflow-x:hidden; }
body {
  background:var(--bg); color:var(--ivory);
  font-family:var(--sans); font-weight:300;
  -webkit-font-smoothing:antialiased; overflow-x:hidden;
}
img { display:block; max-width:100%; }
a { color:inherit; text-decoration:none; }
button { cursor:pointer; background:none; border:none; font:inherit; color:inherit; padding:0; }
h1,h2,h3,h4 { font-size:inherit; font-weight:inherit; }
ul,ol { list-style:none; }
::selection { background:rgba(200,164,104,.35); }
:focus-visible { outline:1px solid var(--gold); outline-offset:3px; }

/* ══ Utilities ══ */
.label { font-family:var(--sans); font-size:10.5px; font-weight:300; text-transform:uppercase; letter-spacing:.32em; }
.serif { font-family:var(--serif); }
.gold  { color:var(--gold); }
.dim   { color:var(--ivory-dim); }

.link-u { position:relative; display:inline-block; }
.link-u::after {
  content:''; position:absolute; bottom:-3px; left:0;
  height:1px; width:100%; transform-origin:right; transform:scaleX(0);
  background:var(--gold); transition:transform .6s var(--ease);
}
.link-u:hover::after, .link-u.on::after { transform-origin:left; transform:scaleX(1); }

.mx { max-width:var(--max); margin-inline:auto; }
.px { padding-inline:1.5rem; }
@media(min-width:768px){ .px{ padding-inline:4rem; } }

/* Scroll-reveal */
.rv { opacity:0; transform:translateY(28px); transition:opacity 1.1s var(--ease), transform 1.1s var(--ease); }
.rv.in { opacity:1; transform:none; }

/* Page transition — cinematic fade */
#app { transition:opacity .5s var(--ease); min-height:100vh; }
#app.fade { opacity:0; }

/* Hairline gold divider */
.rule { width:52px; height:1px; background:var(--gold-dim); }

/* ══ Buttons ══ */
.btn {
  display:inline-flex; align-items:center; justify-content:center; gap:.75rem;
  border:1px solid var(--gold-dim); color:var(--ivory);
  padding:1.05rem 2.9rem;
  font-family:var(--sans); font-size:10.5px; font-weight:300;
  letter-spacing:.32em; text-transform:uppercase;
  background:rgba(11,10,8,.25); backdrop-filter:blur(3px);
  transition:background .6s var(--ease), color .6s var(--ease), border-color .6s var(--ease), letter-spacing .6s var(--ease);
}
.btn:hover { background:var(--gold); border-color:var(--gold); color:#0b0a08; letter-spacing:.38em; }
.btn-solid { background:var(--gold); border-color:var(--gold); color:#0b0a08; }
.btn-solid:hover { background:transparent; color:var(--ivory); }

/* ══ HEADER — minimal overlay ══ */
#hdr {
  position:fixed; inset-inline:0; top:0; z-index:60;
  background:linear-gradient(to bottom, rgba(6,5,4,.55), transparent);
  transition:background .5s;
  pointer-events:none;
}
#hdr.scrolled { background:linear-gradient(to bottom, rgba(6,5,4,.88), rgba(6,5,4,0)); }
.hdr-in {
  max-width:var(--max); margin-inline:auto;
  padding:1.6rem 1.5rem;
  display:flex; align-items:center; justify-content:space-between;
}
@media(min-width:768px){ .hdr-in{ padding:2.1rem 4rem; } }
.hdr-in > * { pointer-events:auto; }

.logo { display:flex; flex-direction:column; gap:.15rem; }
.logo-name {
  font-family:var(--serif); font-weight:300;
  font-size:clamp(1.25rem,2.4vw,1.7rem); letter-spacing:.06em;
  color:var(--ivory); line-height:1;
}
.logo-sub { font-size:8.5px; letter-spacing:.42em; color:var(--gold); text-transform:uppercase; }

.hdr-right { display:flex; align-items:center; gap:1.6rem; }
.lang-btn { color:var(--ivory-dim); font-size:10px; letter-spacing:.22em; transition:color .4s; }
.lang-btn:hover { color:var(--gold); }
.hdr-ig { color:var(--ivory-dim); display:flex; transition:color .4s; }
.hdr-ig:hover { color:var(--gold); }

/* Hamburger — always, on every viewport */
.ham { display:flex; flex-direction:column; gap:7px; padding:6px 2px; z-index:70; position:relative; }
.ham span { display:block; width:30px; height:1px; background:var(--ivory); transition:transform .55s var(--ease), opacity .35s, width .55s var(--ease); }
.ham:hover span { background:var(--gold); }
.ham.open span:nth-child(1){ transform:translateY(8px) rotate(45deg); }
.ham.open span:nth-child(2){ opacity:0; width:0; }
.ham.open span:nth-child(3){ transform:translateY(-8px) rotate(-45deg); }

/* ══ MENU — full-screen overlay ══ */
#menu {
  position:fixed; inset:0; z-index:55;
  background:var(--bg);
  display:flex; align-items:center; justify-content:center;
  opacity:0; pointer-events:none;
  transition:opacity .7s var(--ease);
}
#menu.open { opacity:1; pointer-events:auto; }
.menu-bg { position:absolute; inset:0; overflow:hidden; }
.menu-bg img { width:100%; height:100%; object-fit:cover; opacity:.16; transform:scale(1.05); transition:transform 6s var(--ease); }
#menu.open .menu-bg img { transform:scale(1); }
.menu-veil { position:absolute; inset:0; background:radial-gradient(ellipse at center, rgba(11,10,8,.25), rgba(11,10,8,.92) 78%); }
.menu-in {
  position:relative; z-index:2; text-align:center;
  display:flex; flex-direction:column; align-items:center; gap:2.2rem;
  padding:2rem;
}
.menu-in a.mlink {
  font-family:var(--serif); font-weight:300;
  font-size:clamp(1.9rem,5.2vw,3.4rem); line-height:1.1;
  color:var(--ivory-dim);
  opacity:0; transform:translateY(26px);
  transition:opacity .8s var(--ease), transform .8s var(--ease), color .5s;
}
.menu-in a.mlink:hover { color:var(--gold); }
#menu.open .menu-in a.mlink { opacity:1; transform:none; }
#menu.open .menu-in a.mlink:nth-child(2){ transition-delay:.08s; }
#menu.open .menu-in a.mlink:nth-child(3){ transition-delay:.16s; }
#menu.open .menu-in a.mlink:nth-child(4){ transition-delay:.24s; }
#menu.open .menu-in a.mlink:nth-child(5){ transition-delay:.32s; }
.menu-meta {
  margin-top:1.4rem; display:flex; flex-direction:column; gap:.7rem; align-items:center;
  opacity:0; transition:opacity 1s var(--ease) .45s;
}
#menu.open .menu-meta { opacity:1; }
.menu-meta a { color:var(--ivory-ftn); font-size:10px; letter-spacing:.3em; text-transform:uppercase; transition:color .4s; }
.menu-meta a:hover { color:var(--gold); }

/* ══ FULL-SCREEN HERO (home) ══ */
.hero { position:relative; height:100svh; width:100%; overflow:hidden; background:var(--bg); }
.hero-img { position:absolute; inset:0; }
.hero-img img { width:100%; height:100%; object-fit:cover; animation:kb 16s var(--ease) forwards; }
@keyframes kb { from { transform:scale(1.11); } to { transform:scale(1.02); } }
.hero-veil {
  position:absolute; inset:0; z-index:2; pointer-events:none;
  background:var(--veil);
}
.hero-vig {
  position:absolute; inset:0; z-index:2; pointer-events:none;
  background:radial-gradient(ellipse at center, transparent 45%, rgba(6,5,4,.52) 100%);
}
.hero-cnt {
  position:absolute; inset:0; z-index:3;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  text-align:center; padding:2rem;
  background:radial-gradient(ellipse 62% 58% at center, rgba(6,5,4,.44), transparent 72%);
}
.hero-eye {
  color:var(--gold); font-size:10px; letter-spacing:.5em; text-transform:uppercase;
  animation:rise 1.4s var(--ease) both .3s;
}
.hero-eye-lg {
  font-family:var(--serif); font-style:italic; font-weight:400;
  font-size:clamp(1rem,2.2vw,1.35rem); letter-spacing:.06em; text-transform:none;
  color:var(--ivory); text-shadow:0 2px 20px rgba(6,5,4,.6);
}
.hero-name {
  font-family:var(--serif); font-weight:300;
  font-size:clamp(3rem,10vw,7.5rem); line-height:1.04; letter-spacing:.03em;
  color:var(--ivory); margin-top:1.6rem;
  animation:rise 1.4s var(--ease) both .5s;
  text-shadow:0 2px 40px rgba(6,5,4,.45);
}
.hero-rule { margin-top:2.1rem; animation:rise 1.4s var(--ease) both .7s; }
.hero-tag {
  margin-top:2.1rem; max-width:34rem;
  font-family:var(--serif); font-weight:300; font-size:clamp(1.05rem,2vw,1.3rem);
  line-height:1.7; color:var(--ivory-dim); letter-spacing:.02em;
  animation:rise 1.4s var(--ease) both .85s;
}
.hero-btn { margin-top:3rem; animation:rise 1.4s var(--ease) both 1.05s; }
@keyframes rise { from { opacity:0; transform:translateY(30px); } to { opacity:1; transform:none; } }

.hero-scroll {
  position:absolute; bottom:0; left:50%; transform:translateX(-50%); z-index:3;
  display:flex; flex-direction:column; align-items:center; gap:.9rem;
  padding-bottom:2.2rem; color:var(--ivory-ftn);
  font-size:9px; letter-spacing:.4em; text-transform:uppercase;
  animation:rise 1.4s var(--ease) both 1.3s;
}
.hero-scroll::after {
  content:''; width:1px; height:52px;
  background:linear-gradient(to bottom, var(--gold-dim), transparent);
  animation:drip 2.6s var(--ease) infinite;
}
@keyframes drip { 0%{ transform:scaleY(0); transform-origin:top; } 45%{ transform:scaleY(1); transform-origin:top; } 55%{ transform:scaleY(1); transform-origin:bottom; } 100%{ transform:scaleY(0); transform-origin:bottom; } }
@media(max-height:780px){ .hero-scroll{ display:none; } }

/* ══ STATEMENT ══ */
.stmt { padding-block:9rem 8rem; text-align:center; position:relative; }
@media(min-width:768px){ .stmt{ padding-block:13rem 11rem; } }
.stmt-eye { color:var(--gold); margin-bottom:2.4rem; }
.stmt-txt {
  font-family:var(--serif); font-weight:300;
  font-size:clamp(1.6rem,3.6vw,2.7rem); line-height:1.5;
  max-width:52rem; margin-inline:auto; color:var(--ivory);
}
.stmt-txt em { font-style:italic; color:var(--gold); }

/* ══ COLLECTION PANELS — full-bleed ══ */
.panel {
  position:relative; display:block; width:100%;
  height:78svh; min-height:480px; overflow:hidden; background:var(--bg-2);
  cursor:pointer;
}
@media(min-width:768px){ .panel{ height:88svh; } }
.panel img {
  position:absolute; inset:0; width:100%; height:100%; object-fit:cover;
  opacity:.82; transform:scale(1.04);
  transition:transform 3.2s var(--ease), opacity 1.6s var(--ease);
}
.panel:hover img { transform:scale(1); opacity:1; }
.panel-veil { position:absolute; inset:0; background:var(--veil); transition:opacity .8s; }
.panel-cnt {
  position:absolute; inset:0; z-index:2;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  text-align:center; padding:2rem;
  background:radial-gradient(ellipse 58% 56% at center, rgba(6,5,4,.46), transparent 74%);
}
.panel-no { font-family:var(--serif); font-style:italic; color:var(--gold); font-size:1rem; letter-spacing:.2em; }
.panel-name {
  font-family:var(--serif); font-weight:300;
  font-size:clamp(2.2rem,6vw,4.6rem); line-height:1.08;
  color:var(--ivory); margin-top:1.1rem;
  text-shadow:0 2px 34px rgba(6,5,4,.5);
}
.panel-sub { margin-top:1.2rem; color:var(--gold); font-size:13px; font-weight:400; letter-spacing:.28em; text-transform:uppercase; }
.panel-go {
  margin-top:2.4rem; display:inline-flex; align-items:center;
  color:var(--gold); font-size:10px; letter-spacing:.34em; text-transform:uppercase;
  opacity:.85; transition:opacity .5s;
}
.panel:hover .panel-go { opacity:1; }
.panel-go svg, .ftr-cta svg, .wd-next-arr svg { margin-inline:.6rem; vertical-align:middle; }

/* ══ ACQUIRE CTA ══ */
.acq { position:relative; overflow:hidden; padding-block:11rem; text-align:center; }
@media(min-width:768px){ .acq{ padding-block:15rem; } }
.acq-bg { position:absolute; inset:0; }
.acq-bg img { width:100%; height:100%; object-fit:cover; opacity:.3; }
.acq-veil { position:absolute; inset:0; background:radial-gradient(ellipse at center, rgba(11,10,8,.2), rgba(11,10,8,.94) 82%); }
.acq-cnt { position:relative; z-index:2; padding-inline:1.5rem; }
.acq-h {
  font-family:var(--serif); font-weight:300;
  font-size:clamp(1.9rem,4.6vw,3.5rem); line-height:1.3;
  max-width:44rem; margin-inline:auto;
}
.acq-p { margin-top:1.6rem; color:var(--ivory-dim); font-size:.85rem; letter-spacing:.06em; line-height:1.9; max-width:30rem; margin-inline:auto; }

/* ══ GALLERY PAGE ══ */
.pg-hero { position:relative; height:64svh; min-height:420px; overflow:hidden; background:var(--bg-2); }
.pg-hero img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; opacity:.68; animation:kb 8s var(--ease) forwards; }
.pg-hero-veil { position:absolute; inset:0; background:var(--veil); }
.pg-hero-cnt {
  position:absolute; inset-inline:0; bottom:0; z-index:2;
  max-width:var(--max); margin-inline:auto;
  padding:0 1.5rem 3.4rem;
}
@media(min-width:768px){ .pg-hero-cnt{ padding:0 4rem 4.6rem; } }
.pg-eye { color:var(--gold); }
.pg-h1 {
  font-family:var(--serif); font-weight:300; line-height:1;
  font-size:clamp(2.8rem,8vw,5.8rem); margin-top:1.1rem; letter-spacing:.02em;
}

.gal-filter {
  max-width:var(--max); margin-inline:auto;
  padding:2.6rem 1.5rem 0;
  display:flex; flex-wrap:wrap; gap:1rem 2.4rem;
  border-bottom:1px solid var(--hair);
  padding-bottom:1.8rem;
}
@media(min-width:768px){ .gal-filter{ padding-inline:4rem; } }
.gal-filter a { color:var(--ivory-ftn); font-size:10.5px; letter-spacing:.28em; text-transform:uppercase; transition:color .4s; }
.gal-filter a:hover { color:var(--ivory); }
.gal-filter a.on { color:var(--gold); }

.works-grid {
  max-width:var(--max); margin-inline:auto;
  padding:4.5rem 1.5rem 8rem;
  display:grid; grid-template-columns:1fr; gap:4.5rem;
}
@media(min-width:700px){ .works-grid{ grid-template-columns:1fr 1fr; gap:5rem 4rem; } }
@media(min-width:768px){ .works-grid{ padding-inline:4rem; } }

.wcard { display:block; cursor:pointer; }
.wcard-img { position:relative; aspect-ratio:4/3; overflow:hidden; background:var(--bg-2); }
.wcard-img::after {
  content:''; position:absolute; inset:0;
  background:linear-gradient(to top, rgba(6,5,4,.28), transparent 45%);
  transition:opacity .8s; pointer-events:none;
}
.wcard-img img {
  width:100%; height:100%; object-fit:cover; opacity:.88;
  transition:transform 2.4s var(--ease), opacity 1.2s var(--ease);
}
.wcard:hover .wcard-img img { transform:scale(1.05); opacity:1; }
.wcard:hover .wcard-img::after { opacity:0; }
.wcard-info { padding-top:1.4rem; display:flex; align-items:flex-start; justify-content:space-between; gap:1.5rem; }
.wcard-cat { color:var(--gold); font-size:9.5px; letter-spacing:.3em; text-transform:uppercase; }
.wcard-title { font-family:var(--serif); font-weight:300; font-size:1.5rem; margin-top:.45rem; line-height:1.2; }
.wcard-year { color:var(--ivory-ftn); font-family:var(--serif); font-style:italic; flex-shrink:0; margin-top:.2rem; font-size:.95rem; letter-spacing:.1em; }

/* ══ WORK DETAIL ══ */
.wd-hero { position:relative; width:100%; height:100svh; overflow:hidden; background:var(--bg-2); }
.wd-hero img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; animation:kb 9s var(--ease) forwards; }
.wd-grad { position:absolute; inset:0; background:var(--veil); pointer-events:none; }
.wd-hero-scroll {
  position:absolute; inset:0; display:flex; overflow-x:auto; height:100%;
  scroll-snap-type:x mandatory; -webkit-overflow-scrolling:touch; scrollbar-width:none;
}
.wd-hero-scroll::-webkit-scrollbar { display:none; }
.wd-hero-scroll > div { position:relative; flex:0 0 100%; height:100%; scroll-snap-align:start; }
.wd-hero-scroll img { position:static; inset:auto; width:100%; height:100%; object-fit:cover; transform:scale(1.11); }
.wd-hero-scroll img.kb-active { animation:kb 6.5s var(--ease) forwards; }
.wd-btm {
  position:absolute; inset-inline:0; bottom:0; z-index:2;
  max-width:var(--max); margin-inline:auto;
  padding:0 1.5rem 3.6rem;
}
@media(min-width:768px){ .wd-btm{ padding:0 4rem 5rem; } }
.wd-bread { color:var(--gold); font-size:10px; letter-spacing:.34em; text-transform:uppercase; }
.wd-htitle {
  font-family:var(--serif); font-weight:300; line-height:1.05;
  margin-top:1.2rem; font-size:clamp(2.4rem,7vw,5.5rem);
  text-shadow:0 2px 34px rgba(6,5,4,.5);
}

.wd-body { max-width:var(--max); margin-inline:auto; padding:5.5rem 1.5rem 2rem; }
@media(min-width:768px){ .wd-body{ padding:8rem 4rem 3rem; } }
.wd-back {
  display:inline-flex; align-items:center; gap:.6rem;
  color:var(--ivory-ftn); margin-bottom:3.4rem; transition:color .4s;
  font-size:10px; letter-spacing:.3em; text-transform:uppercase;
}
.wd-back:hover { color:var(--gold); }
.wd-meta {
  display:flex; flex-wrap:wrap; gap:2rem 4.5rem;
  padding-bottom:3rem; border-bottom:1px solid var(--hair);
}
.wd-mk { color:var(--gold); margin-bottom:.5rem; font-size:9.5px; letter-spacing:.3em; text-transform:uppercase; }
.wd-mv { font-family:var(--serif); font-size:1.25rem; font-weight:300; }
.wd-grid { display:grid; grid-template-columns:1fr; gap:2.5rem; margin-top:3.4rem; }
@media(min-width:768px){
  .wd-grid{ grid-template-columns:repeat(12,1fr); gap:0 4rem; }
  .wd-c4{ grid-column:span 4; }
  .wd-c8{ grid-column:span 8; }
}
.wd-desc {
  font-family:var(--serif); font-weight:300; line-height:1.65;
  color:var(--ivory-dim); font-size:1.45rem;
}
@media(min-width:768px){ .wd-desc{ font-size:1.85rem; } }
.wd-cta { margin-top:2.8rem; display:flex; flex-wrap:wrap; gap:1rem; }

.wd-next {
  position:relative; display:block; width:100%; overflow:hidden;
  height:62svh; background:var(--bg-2); margin-top:5rem; cursor:pointer;
}
@media(min-width:768px){ .wd-next{ height:74svh; } }
.wd-next img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; opacity:.55; transform:scale(1.04); transition:transform 3s var(--ease), opacity 1.4s; }
.wd-next:hover img { transform:scale(1); opacity:.75; }
.wd-next-grad { position:absolute; inset:0; background:radial-gradient(ellipse at center, rgba(6,5,4,.25), rgba(6,5,4,.8) 88%); }
.wd-next-cnt {
  position:absolute; inset:0; z-index:2;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  text-align:center; padding:2rem;
}
.wd-next-lbl { color:var(--gold); font-size:10px; letter-spacing:.4em; text-transform:uppercase; }
.wd-next-ttl { font-family:var(--serif); font-weight:300; font-size:clamp(2rem,5.5vw,4rem); line-height:1.1; margin-top:1.3rem; }
.wd-next-arr { display:flex; align-items:center; gap:.7rem; margin-top:1.6rem; color:var(--ivory-dim); font-size:10px; letter-spacing:.3em; text-transform:uppercase; }

/* ══ ABOUT ══ */
.ab-hero { position:relative; height:64svh; min-height:420px; overflow:hidden; background:var(--bg-2); }
@media(min-width:768px){ .ab-hero{ height:100svh; min-height:0; } }

const HL = document.documentElement;
let lang = localStorage.getItem('rc-lang') || 'he';

function applyLang(l) {
  lang = l;
  HL.setAttribute('lang', l);
  HL.setAttribute('dir', l === 'he' ? 'rtl' : 'ltr');
  localStorage.setItem('rc-lang', l);
  document.querySelectorAll('[data-he]').forEach(el => el.style.display = l==='he' ? '' : 'none');
  document.querySelectorAll('[data-en]').forEach(el => el.style.display = l==='en' ? '' : 'none');
}
function T(he, en) { return lang === 'he' ? he : en; }

document.getElementById('lang-btn').addEventListener('click', () => {
  applyLang(lang === 'he' ? 'en' : 'he');
  route();
});

const menu   = document.getElementById('menu');
const hamBtn = document.getElementById('ham-btn');
function closeMenu() {
  menu.classList.remove('open');
  hamBtn.classList.remove('open');
  hamBtn.setAttribute('aria-expanded','false');
  document.body.style.overflow = '';
}
hamBtn.addEventListener('click', () => {
  const o = menu.classList.toggle('open');
  hamBtn.classList.toggle('open', o);
  hamBtn.setAttribute('aria-expanded', String(o));
  document.body.style.overflow = o ? 'hidden' : '';
});
document.querySelectorAll('[data-nav]').forEach(a => a.addEventListener('click', closeMenu));

/* ══ ROUTER ══ */
const app = document.getElementById('app');
function navigate(path) { location.hash = path; }

function route() {
  const hash  = location.hash.replace('#','') || '/';
  const parts = hash.split('/').filter(Boolean);
  const page  = parts[0] || '';
  const sub   = parts[1] || '';

  let html;
  if (!page)               html = buildHome();
  else if (page==='gallery') html = buildGallery(sub);
  else if (page==='work' && sub) {
    const w = AW.find(a => a.slug === sub);
    html = w ? buildWork(w) : buildHome();
  }
  else if (page==='about')     html = buildAbout();
  else if (page==='workshops') html = buildWorkshops();
  else if (page==='studio')    html = buildStudio();
  else if (page==='contact')   html = buildContact();
  else html = buildHome();

  app.classList.add('fade');
  setTimeout(() => {
    app.innerHTML = html;
    app.classList.remove('fade');
    window.scrollTo(0, 0);
    applyLang(lang);
    bindEvents();
  }, 480);
}

let _io = null;
function bindEvents() {
  app.querySelectorAll('[data-slug]').forEach(el => {
    el.addEventListener('click', () => navigate('#/work/' + el.dataset.slug));
    el.addEventListener('keydown', e => { if(e.key==='Enter'||e.key===' ') navigate('#/work/'+el.dataset.slug); });
  });
  app.querySelectorAll('[data-cat]').forEach(el => {
    el.addEventListener('click', e => { e.preventDefault(); navigate('#/gallery/' + el.dataset.cat); });
  });
  app.querySelectorAll('[data-goto]').forEach(el => {
    el.addEventListener('click', () => navigate('#/' + el.dataset.goto));
    el.addEventListener('keydown', e => { if(e.key==='Enter'||e.key===' ') navigate('#/'+el.dataset.goto); });
  });
  const f = app.querySelector('form[data-cf]');
  if (f) f.addEventListener('submit', e => {
    e.preventDefault();
    const name = f.querySelector('[name=name]').value.trim();
    const subject = f.querySelector('[name=subject]').value;
    const msg = f.querySelector('[name=message]').value.trim();
    const subjectMap = {
      sale:'רכישת יצירה', wine:'נייר ויין', sculpture:'קבוצת פיסול', other:'אחר'
    };
    const subLabel = subjectMap[subject] || subject;
    const text = `שלום רבקה!\nשמי ${name}.\nנושא: ${subLabel}\n\n${msg}`;
    window.open('https://wa.me/972523245039?text=' + encodeURIComponent(text), '_blank');
  });

  /* Scroll-reveal */
  if (_io) _io.disconnect();
  _io = new IntersectionObserver(entries => {
    entries.forEach(en => { if (en.isIntersecting) { en.target.classList.add('in'); _io.unobserve(en.target); } });
  }, { threshold:.12 });
  app.querySelectorAll('.rv').forEach(el => _io.observe(el));

  /* Auto-rotating photo carousel (same-artwork multi-photo views) */
  if (_carouselTimer) { clearInterval(_carouselTimer); _carouselTimer = null; }
  const carousel = app.querySelector('.wd-hero-scroll');
  if (carousel && carousel.children.length > 1) {
    const slides = Array.from(carousel.children);
    const imgs = slides.map(s => s.querySelector('img'));
    let idx = 0;

    function activate(i) {
      imgs.forEach(im => im.classList.remove('kb-active'));
      void imgs[i].offsetWidth; // force reflow so the animation restarts
      imgs[i].classList.add('kb-active');
    }
    function slowScrollTo(targetEl, duration) {
      const prev = carousel.style.scrollBehavior;
      carousel.style.scrollBehavior = 'auto';
      const before = carousel.scrollLeft;
      targetEl.scrollIntoView({ inline:'start', block:'nearest' });
      const after = carousel.scrollLeft;
      carousel.scrollLeft = before;
      carousel.style.scrollBehavior = prev;
      const change = after - before;
      const start = performance.now();
      (function step(now) {
        const p = Math.min((now - start) / duration, 1);
        const eased = p < .5 ? 2*p*p : 1 - Math.pow(-2*p+2, 2) / 2;
        carousel.scrollLeft = before + change * eased;
        if (p < 1) requestAnimationFrame(step);
      })(start);
    }

    let userScrollTimer = null;
    carousel.addEventListener('scroll', () => {
      clearTimeout(userScrollTimer);
      userScrollTimer = setTimeout(() => {
        const w = carousel.clientWidth;
        idx = Math.round(Math.abs(carousel.scrollLeft) / w) % slides.length;
        activate(idx);
      }, 120);
    }, { passive:true });

    activate(0);
    _carouselTimer = setInterval(() => {
      idx = (idx + 1) % slides.length;
      slowScrollTo(slides[idx], 1700);
    }, 6500);
  }

  /* Small rotating student-work boxes */
  if (_miniTimer) { clearInterval(_miniTimer); _miniTimer = null; }
  const miniBoxes = app.querySelectorAll('.ws-mini-box');
  if (miniBoxes.length) {
    _miniTimer = setInterval(() => {
      miniBoxes.forEach(box => {
        const imgs = box.querySelectorAll('img');
        let cur = 0;
        imgs.forEach((im, i) => { if (im.classList.contains('on')) cur = i; });
        imgs[cur].classList.remove('on');
        imgs[(cur + 1) % imgs.length].classList.add('on');
      });
    }, 2600);
  }
}
let _carouselTimer = null;
let _miniTimer = null;

/* ══ GALLERY ══ */
function buildGallery(cat) {
  const active = cat || 'all';
  const list   = active==='all' ? AW : AW.filter(a => a.cSlug===active);
  const fil = CATS.map(c =>
    `<a href="#" data-cat="${c.slug}" class="${c.slug===active?'on':''}">
      <span data-he>${c.he}</span><span data-en>${c.en}</span>

  const cards = list.map((w, i) =>
    `<div class="wcard rv" data-slug="${w.slug}" role="button" tabindex="0" style="transition-delay:${(i%2)*90}ms">
      <div class="wcard-img">
