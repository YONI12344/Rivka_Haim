<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>רבקה חיים — פיסול נייר</title>
<meta name="description" content="רבקה חיים — אמנית פיסול נייר ופאפייה-מאשה. יצירות מקוריות וסדנאות סטודיו."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Spectral:ital,wght@0,200;0,300;0,400;1,300&family=Assistant:wght@300;400;500&family=Frank+Ruhl+Libre:wght@300;400&display=swap" rel="stylesheet"/>
<style>
/* ── Exact reference design tokens ──────────────────────────────── */
:root {
  --paper: #fcfbf9;
  --ink:   #282623;
  --char:  #16130e;
  --line:  #d3caba;
  --muted: #8a8174;
  --ease:  cubic-bezier(.22,1,.36,1);
}
html[lang="he"] { --fs: 'Assistant',system-ui,sans-serif; --fsr: 'Frank Ruhl Libre',Georgia,serif; }
html[lang="en"] { --fs: 'Inter',system-ui,sans-serif;     --fsr: 'Spectral',Georgia,serif; }

/* ── Reset ───────────────────────────────────────────────────────── */
*,::before,::after { box-sizing:border-box; margin:0; padding:0; border:0 solid var(--line); }
html { line-height:1.5; -webkit-text-size-adjust:100%; scroll-behavior:smooth; }
body { background:var(--paper); color:var(--ink); font-family:var(--fs); -webkit-font-smoothing:antialiased; }
img  { display:block; max-width:100%; }
a    { color:inherit; text-decoration:none; }
button { cursor:pointer; background:none; border:none; font:inherit; color:inherit; padding:0; }
h1,h2,h3,h4,h5,h6 { font-size:inherit; font-weight:inherit; }
ul,ol { list-style:none; }
:focus-visible { outline:1.5px solid var(--ink); outline-offset:2px; }

/* ── Core utilities ──────────────────────────────────────────────── */
.label { font-family:var(--fs); font-size:11px; text-transform:uppercase; letter-spacing:.22em; }
.serif { font-family:var(--fsr); }
.muted { color:var(--muted); }

/* Link underline animation — exact from reference CSS */
.link-u { position:relative; display:inline-block; }
.link-u::after {
  content:''; position:absolute; bottom:0; left:0;
  height:1px; width:100%;
  transform-origin:right; transform:scaleX(0);
  background:currentColor;
  transition:transform .5s var(--ease);
}
.link-u:hover::after, .link-u.on::after { transform-origin:left; transform:scaleX(1); }

/* ── Layout ──────────────────────────────────────────────────────── */
.mx-page { max-width:1600px; margin-inline:auto; }
.px     { padding-inline:1.5rem; }
@media(min-width:768px){ .px{ padding-inline:2.5rem; } }

/* ── Page transition ─────────────────────────────────────────────── */
#app { transition:opacity .18s ease; min-height:100vh; }
#app.fade { opacity:0; }

/* ══ HEADER ══════════════════════════════════════════════════════════ */
#hdr {
  position:fixed; inset-inline:0; top:0; z-index:50;
  background:rgba(252,251,249,.75);
  backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
}
.hdr-in {
  max-width:1600px; margin-inline:auto;
  padding-inline:1.5rem; padding-block:1.25rem;
  display:flex; align-items:center; justify-content:space-between;
}
@media(min-width:768px){ .hdr-in{ padding-inline:2.5rem; padding-block:1.5rem; } }

.logo { font-family:var(--fsr); font-size:clamp(1.4rem,3vw,2.25rem); font-weight:300; color:var(--ink); line-height:1; }

.nav-d { display:none; align-items:center; gap:2.25rem; }
@media(min-width:768px){ .nav-d{ display:flex; } }
.nav-d a { color:var(--muted); transition:color .4s; }
.nav-d a:hover, .nav-d a.on { color:var(--ink); }

.hdr-right { display:flex; align-items:center; gap:1.25rem; }
.lang-btn  { color:var(--muted); transition:color .3s; }
.lang-btn:hover { color:var(--ink); }

.ham { display:flex; flex-direction:column; gap:5px; padding:4px; }
.ham span { display:block; width:22px; height:1px; background:var(--ink); transition:transform .4s var(--ease),opacity .3s; }
@media(min-width:768px){ .ham{ display:none; } }

/* Mobile nav overlay */
#mob-nav {
  position:fixed; inset:0; z-index:40; background:var(--paper);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2rem;
  transition:opacity .5s var(--ease); pointer-events:none; opacity:0;
}
#mob-nav.open { pointer-events:auto; opacity:1; }
#mob-nav a { font-family:var(--fsr); font-size:1.875rem; font-weight:300; color:var(--ink); }

/* ══ FOOTER ══════════════════════════════════════════════════════════ */
footer { position:relative; z-index:10; border-top:1px solid var(--line); }
.ftr-in {
  max-width:1600px; margin-inline:auto;
  padding-inline:1.5rem; padding-block:3rem;
  display:flex; flex-direction:column; gap:2rem;
}
@media(min-width:768px){
  .ftr-in{ flex-direction:row; align-items:flex-end; justify-content:space-between; padding-inline:2.5rem; padding-block:4rem; }
}
.ftr-tag { font-family:var(--fsr); font-size:1.125rem; font-weight:300; max-width:20rem; line-height:1.55; color:rgba(40,38,35,.7); }
.ftr-links { display:flex; flex-direction:column; gap:.6rem; }
@media(min-width:768px){ .ftr-links{ align-items:flex-end; } }
.ftr-links a { color:var(--muted); transition:color .3s; }
.ftr-links a:hover { color:var(--ink); }
.ftr-copy { color:var(--muted); margin-top:.5rem; }

/* ══ HOME ════════════════════════════════════════════════════════════ */
.home-hero {
  min-height:100svh;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding-inline:1.5rem; padding-block:7rem 8rem; gap:0;
}
.home-tag {
  font-family:var(--fsr); font-size:1.5rem; font-weight:300;
  line-height:1.4; text-align:center; max-width:36rem;
  color:var(--ink); margin-bottom:3rem;
}
@media(min-width:768px){ .home-tag{ font-size:1.875rem; } }

.home-cats {
  display:flex; flex-wrap:wrap; align-items:center; justify-content:center;
  gap:1.25rem 1.5rem; margin-bottom:3.5rem; max-width:36rem;
}
@media(min-width:768px){ .home-cats{ flex-wrap:nowrap; max-width:none; gap:0 1.5rem; margin-bottom:4rem; } }
.home-cats a { color:var(--muted); transition:color .3s; }
.home-cats a:hover, .home-cats a.on { color:var(--ink); }

/* Featured artwork card — portrait, viewport-relative (exact reference sizes) */
.feat {
  position:relative; overflow:hidden;
  background:rgba(211,202,186,.4);
  cursor:pointer; display:block;
  height:64vw; width:51.2vw;
}
@media(min-width:640px){ .feat{ height:58vw; width:46.4vw; } }
@media(min-width:768px){ .feat{ height:58vh; width:46.4vh; } }

/* Slideshow slides */
.feat-slide {
  position:absolute; inset:0;
  opacity:0; transition:opacity 1s var(--ease);
}
.feat-slide.active { opacity:1; }
.feat-slide img {
  width:100%; height:100%; object-fit:cover; opacity:.82;
  transition:transform 5000ms var(--ease), opacity 1400ms var(--ease);
}
.feat-slide.active img { transform:scale(1.04); }
.feat:hover .feat-slide.active img { opacity:.97; }

.feat-grad {
  position:absolute; inset:0; z-index:1;
  background:linear-gradient(to bottom,rgba(22,19,14,.1),transparent 50%,rgba(22,19,14,.5));
  pointer-events:none;
}
.feat-info {
  position:absolute; inset-inline:0; bottom:0; z-index:2;
  padding-inline:1.5rem; padding-bottom:2rem;
}
@media(min-width:768px){ .feat-info{ padding-inline:2rem; padding-bottom:2.5rem; } }
.feat-cat   { color:rgba(252,251,249,.8); transition:opacity .5s; }
.feat-title { font-family:var(--fsr); font-size:1.25rem; font-weight:300; color:var(--paper); margin-top:.4rem; transition:opacity .5s; }

/* Dot indicators */
.feat-dots {
  position:absolute; inset-inline:0; top:1.25rem; z-index:2;
  display:flex; justify-content:center; gap:.4rem;
}
.feat-dot {
  width:18px; height:1.5px;
  background:rgba(252,251,249,.4);
  transition:background .4s, width .4s var(--ease);
}
.feat-dot.active { background:rgba(252,251,249,.9); width:28px; }

/* Image placeholder */
.iph {
  position:absolute; inset:0;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:.75rem; color:rgba(211,202,186,.9);
}
.iph svg   { width:36px; opacity:.6; }
.iph span  { font-size:10px; letter-spacing:.2em; text-transform:uppercase; }

/* ══ GALLERY ═════════════════════════════════════════════════════════ */
.gal-page { padding-top:56px; }
.gal-hdr {
  max-width:1600px; margin-inline:auto;
  padding-inline:1.5rem; padding-block:4rem 2rem;
}
@media(min-width:768px){ .gal-hdr{ padding-inline:2.5rem; padding-block:7rem 2.5rem; } }
.gal-h1 { font-family:var(--fsr); font-size:3rem; font-weight:200; line-height:1; }
@media(min-width:768px){ .gal-h1{ font-size:4.5rem; } }
.gal-filter {
  display:flex; flex-wrap:wrap; gap:.75rem 2rem;
  margin-top:2rem; padding-top:1.5rem; border-top:1px solid var(--line);
}
.gal-filter a { color:var(--muted); transition:color .3s; }
.gal-filter a:hover, .gal-filter a.on { color:var(--ink); }

.works-grid {
  max-width:1600px; margin-inline:auto;
  padding-inline:1.5rem; padding-block:2.5rem 6rem;
  display:grid; grid-template-columns:1fr; gap:1.5rem;
}
@media(min-width:640px){ .works-grid{ grid-template-columns:1fr 1fr; gap:2.5rem; } }
@media(min-width:768px){ .works-grid{ padding-inline:2.5rem; } }

.wcard { display:block; cursor:pointer; }
.wcard-img {
  position:relative; aspect-ratio:4/3;
  overflow:hidden; background:rgba(211,202,186,.35);
}
.wcard-img img {
  width:100%; height:100%; object-fit:cover; opacity:.82;
  transition:transform 1600ms var(--ease),opacity 1400ms var(--ease);
}
.wcard:hover .wcard-img img { transform:scale(1.04); opacity:.97; }
.wcard-info { padding-block:.85rem; display:flex; align-items:flex-start; justify-content:space-between; gap:1rem; }
.wcard-cat   { color:var(--muted); }
.wcard-title { font-family:var(--fsr); font-size:1.125rem; font-weight:300; margin-top:.2rem; }
.wcard-year  { color:var(--muted); flex-shrink:0; margin-top:.15rem; }

/* ══ WORK DETAIL ═════════════════════════════════════════════════════ */
/* Hero — full-width, tall (88svh on desktop), title overlaid at bottom */
.wd-hero {
  position:relative; width:100%; height:78svh;
  overflow:hidden; background:var(--char);
}
@media(min-width:768px){ .wd-hero{ height:88svh; } }
.wd-hero-img { position:absolute; inset:0; }
.wd-hero-img img { width:100%; height:100%; object-fit:cover; opacity:.82; }
.wd-grad {
  position:absolute; inset:0;
  background:linear-gradient(to bottom,rgba(22,19,14,.2),transparent 45%,rgba(22,19,14,.5));
}
/* Title + breadcrumb OVERLAID at the bottom of the hero image */
.wd-btm {
  position:absolute; inset-inline:0; bottom:0;
  padding-inline:1.5rem; padding-bottom:3rem;
  max-width:1600px; margin-inline:auto;
}
@media(min-width:768px){ .wd-btm{ padding-inline:2.5rem; padding-bottom:4rem; } }
.wd-bread { color:rgba(252,251,249,.8); }
.wd-htitle {
  font-family:var(--fsr); font-weight:200; line-height:1;
  color:var(--paper); margin-top:1rem; font-size:2.25rem;
}
@media(min-width:768px){ .wd-htitle{ font-size:4.5rem; } }

/* Content below hero */
.wd-body {
  max-width:1600px; margin-inline:auto;
  padding-inline:1.5rem; padding-block:4rem 2rem;
}
@media(min-width:768px){ .wd-body{ padding-inline:2.5rem; padding-block:7rem 2.5rem; } }

.wd-back {
  display:inline-flex; align-items:center; gap:.4rem;
  color:var(--muted); margin-bottom:2.5rem; transition:color .3s;
}
.wd-back:hover { color:var(--ink); }

/* Metadata — flex row of key/value pairs */
.wd-meta {
  display:flex; flex-wrap:wrap; gap:1.5rem 3rem;
  padding-bottom:2.5rem; border-bottom:1px solid var(--line);
}
.wd-mk { color:var(--muted); margin-bottom:.35rem; }
.wd-mv { font-family:var(--fsr); font-size:1.125rem; font-weight:300; }

/* 12-col grid for description */
.wd-grid { display:grid; grid-template-columns:1fr; gap:2.5rem; margin-top:2.5rem; }
@media(min-width:768px){
  .wd-grid{ grid-template-columns:repeat(12,1fr); gap:0 4rem; }
  .wd-c4{ grid-column:span 4; }
  .wd-c8{ grid-column:span 8; }
}

.wd-desc {
  font-family:var(--fsr); font-weight:300; line-height:1.65;
  color:rgba(40,38,35,.85); font-size:1.5rem;
}
@media(min-width:768px){ .wd-desc{ font-size:1.875rem; } }

.btn-inq {
  display:inline-flex; align-items:center; gap:.5rem;
  margin-top:2rem; border:1px solid var(--line);
  padding:.85rem 1.75rem; color:var(--ink);
  transition:background .4s,color .4s,border-color .4s;
}
.btn-inq:hover { background:var(--ink); color:var(--paper); border-color:var(--ink); }

/* Gallery strip */
.wd-gal-wrap {
  max-width:1600px; margin-inline:auto;
  padding-inline:1.5rem; padding-block:1.5rem 0;
}
@media(min-width:768px){ .wd-gal-wrap{ padding-inline:2.5rem; } }
.wd-gal { display:grid; grid-template-columns:1fr; gap:1.5rem; }
@media(min-width:640px){ .wd-gal{ grid-template-columns:1fr 1fr; } }
@media(min-width:768px){ .wd-gal{ gap:2.5rem; } }
.wd-gi { position:relative; overflow:hidden; background:rgba(211,202,186,.3); aspect-ratio:4/3; }
.wd-gi.wide { grid-column:1/-1; aspect-ratio:16/7; }
.wd-gi img  { width:100%; height:100%; object-fit:cover; }

/* Next artwork — full-width tall card */
.wd-next {
  position:relative; display:block; width:100%; overflow:hidden;
  height:52svh; background:var(--char); margin-top:2.5rem; cursor:pointer;
}
@media(min-width:768px){ .wd-next{ height:64svh; } }
.wd-next-img { position:absolute; inset:0; }
.wd-next-img img { width:100%; height:100%; object-fit:cover; }
.wd-next-grad {
  position:absolute; inset:0;
  background:linear-gradient(to bottom,rgba(22,19,14,.65),rgba(22,19,14,0) 40%,rgba(22,19,14,.75));
}
.wd-next-cnt {
  position:absolute; inset:0;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  text-align:center; color:var(--paper); padding:2rem;
}
.wd-next-lbl  { color:rgba(252,251,249,.8); }
.wd-next-ttl  { font-family:var(--fsr); font-weight:200; font-size:2.25rem; line-height:1.1; margin-top:1rem; }
@media(min-width:768px){ .wd-next-ttl{ font-size:3.75rem; } }
.wd-next-arr  { display:flex; align-items:center; gap:.5rem; margin-top:1.25rem; color:rgba(252,251,249,.8); }

/* ══ ABOUT ═══════════════════════════════════════════════════════════ */
.ab-page { padding-top:56px; }
.ab-wrap {
  max-width:1600px; margin-inline:auto;
  padding-inline:1.5rem; padding-block:6rem;
}
@media(min-width:768px){ .ab-wrap{ padding-inline:2.5rem; padding-block:11rem 8rem; } }
.ab-grid { display:grid; grid-template-columns:1fr; gap:3rem; }
@media(min-width:768px){
  .ab-grid{ grid-template-columns:repeat(12,1fr); gap:4rem; }
  .ab-c5{ grid-column:span 5; }
  .ab-c7{ grid-column:span 7; padding-inline-start:2rem; }
}
.ab-port { position:relative; overflow:hidden; background:rgba(211,202,186,.5); aspect-ratio:4/5; }
.ab-port img { width:100%; height:100%; object-fit:cover; }

.ab-eye { color:var(--muted); }
.ab-h1  {
  font-family:var(--fsr); font-weight:200; line-height:1.2;
  margin-top:1.25rem; font-size:3rem; max-width:36rem;
}
@media(min-width:768px){ .ab-h1{ font-size:3.75rem; } }
.ab-body {
  margin-top:2.5rem; max-width:36rem;
  display:flex; flex-direction:column; gap:1.5rem;
  font-size:1rem; line-height:1.7; color:rgba(40,38,35,.75);
}
html[lang="he"] .ab-body { font-family:var(--fsr); font-size:1.05rem; }
.ab-cats {
  margin-top:3rem; padding-top:2rem; border-top:1px solid var(--line);
  display:flex; flex-wrap:wrap; gap:.75rem 1.5rem;
}
.ab-cats a { font-family:var(--fsr); font-size:1.125rem; font-weight:300; color:var(--ink); transition:opacity .3s; }
.ab-cats a:hover { opacity:.55; }
.ab-cta { display:inline-flex; align-items:center; gap:.5rem; margin-top:1.25rem; font-family:var(--fsr); font-size:1.125rem; font-weight:300; }

/* ══ WORKSHOPS ═══════════════════════════════════════════════════════ */
.ws-page { padding-top:56px; }
.ws-wrap {
  max-width:1600px; margin-inline:auto;
  padding-inline:1.5rem; padding-block:6rem;
}
@media(min-width:768px){ .ws-wrap{ padding-inline:2.5rem; padding-block:11rem 8rem; } }
.ws-h1 { font-family:var(--fsr); font-weight:200; line-height:1; font-size:3rem; }
@media(min-width:768px){ .ws-h1{ font-size:4.5rem; } }
.ws-intro {
  margin-top:1.25rem; max-width:36rem;
  font-family:var(--fsr); font-size:1.125rem; font-weight:300;
  line-height:1.6; color:rgba(40,38,35,.7);
}
@media(min-width:768px){ .ws-intro{ font-size:1.25rem; } }
.ws-list { margin-top:4rem; border-top:1px solid var(--line); }
.ws-row {
  padding-block:2rem; border-bottom:1px solid var(--line);
  display:grid; grid-template-columns:1fr; gap:1.5rem;
}
@media(min-width:768px){
  .ws-row{ grid-template-columns:repeat(12,1fr); gap:2rem 4rem; padding-block:2.5rem; align-items:start; }
  .wsr-l{ grid-column:span 7; }
  .wsr-r{ grid-column:span 5; display:flex; flex-direction:column; align-items:flex-end; gap:1rem; }
  html[dir="rtl"] .wsr-r{ align-items:flex-start; }
}
.wsr-type { color:var(--muted); margin-bottom:.5rem; }
.wsr-name { font-family:var(--fsr); font-size:1.5rem; font-weight:300; line-height:1.2; margin-bottom:.85rem; }
@media(min-width:768px){ .wsr-name{ font-size:1.875rem; } }
.wsr-desc { font-size:.9rem; line-height:1.7; color:rgba(40,38,35,.7); max-width:36rem; }
html[lang="he"] .wsr-desc{ font-family:var(--fsr); font-size:.95rem; }
.wsr-specs { display:flex; flex-wrap:wrap; gap:1rem 2rem; margin-top:1.25rem; }
.wsr-sk { color:var(--muted); margin-bottom:.15rem; }
.wsr-sv { font-size:.9rem; }
.wsr-price { font-family:var(--fsr); font-size:2.25rem; font-weight:300; line-height:1; }
.wsr-pnote { color:var(--muted); margin-top:.3rem; }
.btn-ws {
  display:inline-block; margin-top:.75rem;
  border:1px solid var(--line); padding:.75rem 1.5rem;
  color:var(--ink); transition:background .4s,color .4s,border-color .4s; white-space:nowrap;
}
.btn-ws:hover { background:var(--ink); color:var(--paper); border-color:var(--ink); }

/* ══ CONTACT ═════════════════════════════════════════════════════════ */
.ct-page { padding-top:56px; }
.ct-wrap {
  max-width:1600px; margin-inline:auto;
  padding-inline:1.5rem; padding-block:6rem;
}
@media(min-width:768px){ .ct-wrap{ padding-inline:2.5rem; padding-block:11rem 8rem; } }
.ct-grid { display:grid; grid-template-columns:1fr; gap:4rem; }
@media(min-width:768px){
  .ct-grid{ grid-template-columns:repeat(12,1fr); gap:4rem; }
  .ct-l{ grid-column:span 4; }
  .ct-r{ grid-column:span 8; }
}
.ct-h1 { font-family:var(--fsr); font-weight:200; line-height:1; font-size:3rem; margin-bottom:2rem; }
@media(min-width:768px){ .ct-h1{ font-size:4.5rem; } }
.ct-chs { display:flex; flex-direction:column; }
.ct-ch {
  display:flex; align-items:flex-start; gap:.75rem;
  padding-block:1.25rem; border-bottom:1px solid var(--line);
  color:var(--ink); transition:opacity .3s;
}
.ct-ch:first-child { border-top:1px solid var(--line); }
.ct-ch:hover { opacity:.6; }
.ct-ch-k { color:var(--muted); min-width:5rem; flex-shrink:0; }
.ct-ch-v { font-family:var(--fsr); font-size:1rem; font-weight:300; }
.ct-fh { font-family:var(--fsr); font-size:1.5rem; font-weight:300; margin-bottom:2rem; color:rgba(40,38,35,.75); }
.fg { margin-bottom:2rem; }
.fg label { display:block; color:var(--muted); margin-bottom:.45rem; }
.fg input,.fg textarea,.fg select {
  width:100%; background:transparent;
  border-bottom:1px solid var(--line);
  font-family:var(--fs); font-size:.95rem; color:var(--ink);
  padding-block:.5rem; outline:none; -webkit-appearance:none;
  transition:border-color .3s;
}
.fg input:focus,.fg textarea:focus,.fg select:focus { border-bottom-color:var(--ink); }
.fg input::placeholder,.fg textarea::placeholder { color:var(--line); }
.fg textarea { resize:vertical; min-height:120px; }
.fg select option { background:var(--paper); }
.fg-row { display:grid; grid-template-columns:1fr 1fr; gap:0 1.5rem; }
@media(max-width:480px){ .fg-row{ grid-template-columns:1fr; } }
.btn-send {

  border:1px solid var(--ink); padding:1rem 2.5rem;
  transition:background .4s,color .4s; margin-top:.5rem;
}
.btn-send:hover { background:transparent; color:var(--ink); }
</style>

<script>
/* ══ DATA ══════════════════════════════════════════════════════════ */
const AW = [
  { slug:'yotzer-1', featured:true,
    tHe:'[שם יצירה 1]', tEn:'[Piece Title 1]',
    cSlug:'papier-mache', cHe:'פאפייה-מאשה', cEn:'Papier-mâché',

    dEn:'[Short description — spirit, process, what it evokes. Approx. 40 words.]' },
  { slug:'yotzer-2',

    dHe:'[תיאור קצר]', dEn:'[Short description]' },
  { slug:'yotzer-3',
    tHe:'[שם יצירה 3]', tEn:'[Piece Title 3]',
    cSlug:'collage', cHe:"קולאז'", cEn:'Collage',
    mHe:"קולאז' נייר ואקוורל", mEn:'Paper collage and watercolour',

  { slug:'yotzer-4',
    tHe:'[שם יצירה 4]', tEn:'[Piece Title 4]',
    cSlug:'papier-mache', cHe:'פאפייה-מאשה', cEn:'Papier-mâché',
    mHe:'פאפייה-מאשה ופיגמנטים', mEn:'Papier-mâché and pigments',
    dims:'[W × H × D] ס"מ', yr:'[שנה]', price:'₪[מחיר]',
    dHe:'[תיאור קצר]', dEn:'[Short description]' },
  { slug:'yotzer-5',
    tHe:'[שם יצירה 5]', tEn:'[Piece Title 5]',
    cSlug:'paper-sculpture', cHe:'פיסול נייר', cEn:'Paper sculpture',
    mHe:'נייר ומתכת', mEn:'Paper and metal',
    dims:'[W × H × D] ס"מ', yr:'[שנה]', price:'₪[מחיר]',
    dHe:'[תיאור קצר]', dEn:'[Short description]' },
  { slug:'yotzer-6',
    tHe:'[שם יצירה 6]', tEn:'[Piece Title 6]',
    cSlug:'collage', cHe:"קולאז'", cEn:'Collage',
    mHe:'שכבות נייר ודיו', mEn:'Layered paper and ink',
    dims:'[W × H × D] ס"מ', yr:'[שנה]', price:'₪[מחיר]',
    dHe:'[תיאור קצר]', dEn:'[Short description]' },
  { slug:'yotzer-7',
    tHe:'[שם יצירה 7]', tEn:'[Piece Title 7]',
    cSlug:'papier-mache', cHe:'פאפייה-מאשה', cEn:'Papier-mâché',
    mHe:'פאפייה-מאשה וצבעי אקריל', mEn:'Papier-mâché and acrylic',
    dims:'[W × H × D] ס"מ', yr:'[שנה]', price:'₪[מחיר]',
    dHe:'[תיאור קצר]', dEn:'[Short description]' },
  { slug:'yotzer-8',
    tHe:'[שם יצירה 8]', tEn:'[Piece Title 8]',
    cSlug:'paper-sculpture', cHe:'פיסול נייר', cEn:'Paper sculpture',
    mHe:'נייר ועץ', mEn:'Paper and wood',
    dims:'[W × H × D] ס"מ', yr:'[שנה]', price:'₪[מחיר]',
    dHe:'[תיאור קצר]', dEn:'[Short description]' },
];
const CATS = [
  { slug:'all',            he:'כל היצירות',   en:'All works' },
  { slug:'papier-mache',   he:'פאפייה-מאשה',  en:'Papier-mâché' },
  { slug:'paper-sculpture',he:'פיסול נייר',   en:'Paper sculpture' },
  { slug:'collage',        he:"קולאז'",        en:'Collage' },
];

/* ══ LANGUAGE ══════════════════════════════════════════════════════ */
const HL = document.documentElement;
let lang = localStorage.getItem('rc-lang') || 'he';

function applyLang(l) {
  lang = l;
  HL.setAttribute('lang', l);
  HL.setAttribute('dir', l === 'he' ? 'rtl' : 'ltr');
  localStorage.setItem('rc-lang', l);
  document.querySelectorAll('[data-he]').forEach(el => el.style.display = l==='he' ? '' : 'none');
  document.querySelectorAll('[data-en]').forEach(el => el.style.display = l==='en' ? '' : 'none');
}
function T(he, en) { return lang === 'he' ? he : en; }

document.getElementById('lang-btn').addEventListener('click', () => {
  applyLang(lang === 'he' ? 'en' : 'he');
  route();
});

/* ══ MOBILE MENU ══════════════════════════════════════════════════ */
const mobNav = document.getElementById('mob-nav');
const hamBtn = document.getElementById('ham-btn');
function closeMob() {
  mobNav.classList.remove('open');
  hamBtn.setAttribute('aria-expanded','false');
  document.body.style.overflow = '';
}
hamBtn.addEventListener('click', () => {
  const o = mobNav.classList.toggle('open');
  hamBtn.setAttribute('aria-expanded', String(o));
  document.body.style.overflow = o ? 'hidden' : '';
});
document.querySelectorAll('[data-nav]').forEach(a => a.addEventListener('click', closeMob));

/* ══ ROUTER ════════════════════════════════════════════════════════ */
const app = document.getElementById('app');

function navigate(path) { location.hash = path; }

function route() {
  const hash  = location.hash.replace('#','') || '/';
  const parts = hash.split('/').filter(Boolean);
  const page  = parts[0] || '';
  const sub   = parts[1] || '';

  document.querySelectorAll('.nav-d a').forEach(a => {
    const h = a.getAttribute('href').replace('#/','');
    a.classList.toggle('on', h === page || (h==='gallery' && page==='gallery'));
  });

  let html;
  if (!page)               html = buildHome();
  else if (page==='gallery') html = buildGallery(sub);
  else if (page==='work' && sub) {
    const w = AW.find(a => a.slug === sub);
    html = w ? buildWork(w) : buildHome();
  }
  else if (page==='about')     html = buildAbout();
  else if (page==='workshops') html = buildWorkshops();
  else if (page==='contact')   html = buildContact();
  else html = buildHome();

  app.classList.add('fade');
  setTimeout(() => {
    app.innerHTML = html;
    app.classList.remove('fade');
    window.scrollTo(0, 0);
    applyLang(lang);
    bindEvents();
  }, 180);
}

function bindEvents() {
  // Stop any running slideshow when navigating away
  if (_slideTimer) { clearInterval(_slideTimer); _slideTimer = null; }

  app.querySelectorAll('[data-slug]').forEach(el => {
    el.addEventListener('click',    () => navigate('#/work/' + el.dataset.slug));
    el.addEventListener('keydown',  e => { if(e.key==='Enter'||e.key===' ') navigate('#/work/'+el.dataset.slug); });
  });
  app.querySelectorAll('[data-cat]').forEach(el => {
    el.addEventListener('click', e => { e.preventDefault(); navigate('#/gallery/' + el.dataset.cat); });
  });
  const f = app.querySelector('form[data-cf]');
  if (f) f.addEventListener('submit', e => { e.preventDefault(); alert(T('תודה! ניצור איתך קשר בקרוב.','Thank you! We\'ll be in touch soon.')); });

  // Start slideshow if we're on the home page
  if (document.getElementById('feat-card')) startSlideshow();
}

window.addEventListener('hashchange', route);

/* ══ SHARED HELPERS ════════════════════════════════════════════════ */
function iph(he, en) {
  return `<div class="iph">
    <svg viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width=".7" aria-hidden="true">
      <rect x="1" y="1" width="38" height="38"/><line x1="1" y1="1" x2="39" y2="39"/><line x1="39" y1="1" x2="1" y2="39"/>
    </svg>
    <span data-he>${he}</span><span data-en>${en}</span>
  </div>`;
}
function arrR() { return `<svg width="20" height="8" viewBox="0 0 20 8" fill="none" stroke="currentColor" stroke-width="1.2" aria-hidden="true"><path d="M1 4h18M14 1l4 3-4 3"/></svg>`; }
function arrL() { return `<svg width="14" height="8" viewBox="0 0 14 8" fill="none" stroke="currentColor" stroke-width="1.2" aria-hidden="true"><path d="M13 4H1M5 1L1 4l4 3"/></svg>`; }

function footer() {
  const yr = new Date().getFullYear();
  return `<footer>
    <div class="ftr-in">
      <p class="ftr-tag">
        <span data-he>פיסול נייר ופאפייה-מאשה — יצירות שמחזיקות זמן בתוכן.</span>
        <span data-en>Paper sculpture and papier-mâché — works that hold time inside them.</span>
      </p>
      <div class="ftr-links label">
        <a href="#/gallery"   class="link-u"><span data-he>גלריה</span><span data-en>Gallery</span></a>
        <a href="#/workshops" class="link-u"><span data-he>סדנאות</span><span data-en>Workshops</span></a>
        <a href="#/about"     class="link-u"><span data-he>אודות</span><span data-en>About</span></a>
        <a href="#/contact"   class="link-u"><span data-he>יצירת קשר</span><span data-en>Contact</span></a>
        <a href="https://instagram.com/[INSTAGRAM]" target="_blank" rel="noopener" class="link-u">Instagram (@[INSTAGRAM])</a>
        <p class="ftr-copy">© ${yr} <span data-he>רבקה חיים — כל הזכויות שמורות</span><span data-en>Rivka Haim — All rights reserved</span></p>
      </div>
    </div>
  </footer>`;
}

/* ══ HOME ══════════════════════════════════════════════════════════ */
let _slideTimer = null;
let _slideIdx   = 0;

function buildHome() {
  const cats = CATS.map(c =>
    `<a href="#" data-cat="${c.slug}" class="label link-u">
      <span data-he>${c.he}</span><span data-en>${c.en}</span>
    </a>`).join('');

  // One slide per artwork
  const slides = AW.map((w, i) =>
    `<div class="feat-slide${i===0?' active':''}" data-i="${i}">
      ${iph(`[תמונה ${i+1}]`, `[IMAGE ${i+1}]`)}
    </div>`
  ).join('');

  const dots = AW.map((_,i) =>
    `<div class="feat-dot${i===0?' active':''}"></div>`
  ).join('');

  return `<main>
    <section class="home-hero">
      <p class="home-tag">
        <span data-he>פיסול שמעביר את מה שמרגישים כשמחזיקים נייר בידיים — לא רק את מה שרואים.</span>
        <span data-en>Sculpture that conveys what it feels like to hold paper in your hands — not only what you see.</span>
      </p>
      <nav class="home-cats label">${cats}</nav>
      <div class="feat" id="feat-card" role="button" tabindex="0" data-slug="${AW[0].slug}">
        ${slides}
        <div class="feat-grad"></div>
        <div class="feat-dots">${dots}</div>
        <div class="feat-info">
          <p class="label feat-cat" id="feat-cat">
            <span data-he>${AW[0].cHe}</span><span data-en>${AW[0].cEn}</span>
          </p>
          <p class="feat-title" id="feat-title">
            <span data-he>${AW[0].tHe}</span><span data-en>${AW[0].tEn}</span>
          </p>
        </div>
      </div>
    </section>
  </main>${footer()}`;
}

function startSlideshow() {
  if (_slideTimer) clearInterval(_slideTimer);
  _slideIdx = 0;
  _slideTimer = setInterval(advanceSlide, 3800);
}

function advanceSlide() {
  const slides = document.querySelectorAll('.feat-slide');
  const dots   = document.querySelectorAll('.feat-dot');
  const catEl  = document.getElementById('feat-cat');
  const ttlEl  = document.getElementById('feat-title');
  const card   = document.getElementById('feat-card');
  if (!slides.length) return;

  slides[_slideIdx].classList.remove('active');
  dots[_slideIdx].classList.remove('active');
  _slideIdx = (_slideIdx + 1) % AW.length;
  slides[_slideIdx].classList.add('active');
  dots[_slideIdx].classList.add('active');

  const w = AW[_slideIdx];
  if (catEl) catEl.innerHTML = `<span data-he>${w.cHe}</span><span data-en>${w.cEn}</span>`;
  if (ttlEl) ttlEl.innerHTML = `<span data-he>${w.tHe}</span><span data-en>${w.tEn}</span>`;
  if (card)  card.dataset.slug = w.slug;
  applyLang(lang);
}

/* ══ GALLERY ═══════════════════════════════════════════════════════ */
function buildGallery(cat) {
  const active = cat || 'all';
  const list   = active==='all' ? AW : AW.filter(a => a.cSlug===active);
  const fil = CATS.map(c =>
    `<a href="#" data-cat="${c.slug}" class="label link-u ${c.slug===active?'on':''}">
      <span data-he>${c.he}</span><span data-en>${c.en}</span>
    </a>`).join('');
  const cards = list.map(w =>
    `<div class="wcard" data-slug="${w.slug}" role="button" tabindex="0">
      <div class="wcard-img">${iph('[תמונה]','[IMAGE]')}</div>
      <div class="wcard-info">
        <div class="wcard-left">
          <p class="label wcard-cat"><span data-he>${w.cHe}</span><span data-en>${w.cEn}</span></p>
          <p class="wcard-title"><span data-he>${w.tHe}</span><span data-en>${w.tEn}</span></p>
        </div>
        <p class="label wcard-year muted">${w.yr}</p>
      </div>
    </div>`).join('');
  return `<div class="gal-page">
    <div class="gal-hdr">
      <h1 class="gal-h1"><span data-he>גלריה</span><span data-en>Gallery</span></h1>
      <nav class="gal-filter label">${fil}</nav>
    </div>
    <div class="works-grid">${cards||`<p class="muted label" style="grid-column:1/-1;padding:3rem">
      <span data-he>אין יצירות בקטגוריה זו.</span><span data-en>No works in this category.</span></p>`}
    </div>
  </div>${footer()}`;
}

/* ══ WORK DETAIL ═══════════════════════════════════════════════════ */
function buildWork(w) {
  const idx  = AW.indexOf(w);
  const next = AW[(idx+1) % AW.length];
  const meta = [
    { kh:'חומר',   ke:'Medium',     vh:w.mHe,   ve:w.mEn   },
    { kh:'מידות',  ke:'Dimensions', vh:w.dims,  ve:w.dims  },
    { kh:'שנה',    ke:'Year',       vh:w.yr,    ve:w.yr    },

  ].map(m => `<div>
    <p class="label wd-mk"><span data-he>${m.kh}</span><span data-en>${m.ke}</span></p>
    <p class="wd-mv"><span data-he>${m.vh}</span><span data-en>${m.ve}</span></p>
  </div>`).join('');

  return `<article>
    <div class="wd-hero">

        <p class="label wd-bread"><span data-he>${w.cHe}</span><span data-en>${w.cEn}</span></p>

      </div>
    </div>
    <div class="wd-body">
      <a href="#/gallery" class="wd-back label link-u">${arrL()}<span data-he>חזרה לגלריה</span><span data-en>Back to gallery</span></a>
      <div class="wd-meta">${meta}</div>
      <div class="wd-grid">
        <div class="wd-c4"></div>
        <div class="wd-c8">
          <p class="wd-desc"><span data-he>${w.dHe}</span><span data-en>${w.dEn}</span></p>
          <a href="#/contact" class="btn-inq label">
            <span data-he>פנייה לרכישה</span><span data-en>Inquire to purchase</span>${arrR()}
          </a>
        </div>
      </div>
    </div>
    <div class="wd-gal-wrap">
      <div class="wd-gal">
        <div class="wd-gi wide">${iph('[פירוט 1]','[DETAIL 1]')}</div>
        <div class="wd-gi">${iph('[פירוט 2]','[DETAIL 2]')}</div>
        <div class="wd-gi">${iph('[פירוט 3]','[DETAIL 3]')}</div>
        <div class="wd-gi">${iph('[פירוט 4]','[DETAIL 4]')}</div>

    <div class="wd-next" data-slug="${next.slug}" role="button" tabindex="0">

        <div class="wd-next-arr label"><span data-he>לצפייה ביצירה</span><span data-en>View work</span>${arrR()}</div>

/* ══ ABOUT ═════════════════════════════════════════════════════════ */
function buildAbout() {
  const catLinks = CATS.filter(c=>c.slug!=='all').map(c =>
    `<a href="#" data-cat="${c.slug}" class="link-u serif" style="font-size:1.125rem;font-weight:300">
      <span data-he>${c.he}</span><span data-en>${c.en}</span>
    </a>`).join('');
  return `<div class="ab-page">
    <div class="ab-wrap">
      <div class="ab-grid">
        <div class="ab-c5">
          <div class="ab-port">${iph('[תמונת האמנית]','[ARTIST PHOTO]')}</div>
        </div>
        <div class="ab-c7">
          <p class="label ab-eye"><span data-he>אודות</span><span data-en>About</span></p>
          <h1 class="ab-h1">
            <span data-he>אני עובדת עם נייר כי הוא מחזיק כל מה שמניחים עליו.</span>
            <span data-en>I work with paper because it holds everything placed on it.</span>
          </h1>
          <div class="ab-body">
            <p><span data-he>[פסקה ראשונה — מי היא רבקה, מה הוביל אותה לפיסול נייר ופאפייה-מאשה, הסגנון הייחודי שלה. כ-70 מילה.]</span>
