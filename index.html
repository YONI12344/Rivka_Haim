<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>רבקה חיים — אמנות נייר ופיסול</title>
<meta name="description" content="רבקה חיים — אמנית נייר נוזלי ופיסול. יצירות מקוריות, הזמנות אישיות וסדנאות סטודיו."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;500&family=Frank+Ruhl+Libre:wght@300;400&display=swap" rel="stylesheet"/>
<style>
/* ── Design tokens ──────────────────────────────── */
:root {
  --paper: #fcfbf9;
  --ink:   #282623;
  --char:  #16130e;
  --line:  #d3caba;
  --muted: #8a8174;
  --ease:  cubic-bezier(.22,1,.36,1);
  --max:   1600px;
}
html[lang="he"] { --fs: 'Assistant',system-ui,sans-serif; --fsr: 'Frank Ruhl Libre',Georgia,serif; }
html[lang="en"] { --fs: 'Assistant',system-ui,sans-serif; --fsr: 'Frank Ruhl Libre',Georgia,serif; }

/* ── Reset ─── */
*,::before,::after { box-sizing:border-box; margin:0; padding:0; border:0 solid var(--line); }
html { line-height:1.5; -webkit-text-size-adjust:100%; scroll-behavior:smooth; overflow-x:hidden; }
body { background:var(--paper); color:var(--ink); font-family:var(--fs); -webkit-font-smoothing:antialiased; overflow-x:hidden; }
img  { display:block; max-width:100%; }
a    { color:inherit; text-decoration:none; }
button { cursor:pointer; background:none; border:none; font:inherit; color:inherit; padding:0; }
h1,h2,h3,h4,h5,h6 { font-size:inherit; font-weight:inherit; }
ul,ol { list-style:none; }
:focus-visible { outline:1.5px solid var(--ink); outline-offset:2px; }

/* ── Utilities ─── */
.label { font-family:var(--fs); font-size:11px; text-transform:uppercase; letter-spacing:.22em; }
.serif { font-family:var(--fsr); }
.muted { color:var(--muted); }

.link-u { position:relative; display:inline-block; }
.link-u::after {
  content:''; position:absolute; bottom:0; left:0;
  height:1px; width:100%; transform-origin:right; transform:scaleX(0);
  background:currentColor; transition:transform .5s var(--ease);
}
.link-u:hover::after, .link-u.on::after { transform-origin:left; transform:scaleX(1); }

/* ── Layout ─── */
.mx   { max-width:var(--max); margin-inline:auto; }
.px   { padding-inline:1.5rem; }
@media(min-width:768px){ .px{ padding-inline:2.5rem; } }

/* ── Page transition ─── */
#app { transition:opacity .18s ease; min-height:100vh; }
#app.fade { opacity:0; }

/* ══ HEADER ══ */
#hdr {
  position:fixed; inset-inline:0; top:0; z-index:50;
  background:rgba(252,251,249,.82);
  backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(211,202,186,.5);
}
.hdr-in {
  max-width:var(--max); margin-inline:auto;
  padding-inline:1.5rem; padding-block:1.1rem;
  display:flex; align-items:center; justify-content:space-between;
}
@media(min-width:768px){ .hdr-in{ padding-inline:2.5rem; padding-block:1.35rem; } }

.logo { display:flex; flex-direction:column; gap:.1rem; }
.logo-name { font-family:var(--fsr); font-size:clamp(1.3rem,2.8vw,2rem); font-weight:300; color:var(--ink); line-height:1; }
.logo-sub  { font-family:var(--fs); font-size:.58rem; letter-spacing:.2em; color:var(--muted); text-transform:uppercase; }

.nav-d { display:none; align-items:center; gap:2rem; }
@media(min-width:768px){ .nav-d{ display:flex; } }
.nav-d a { color:var(--muted); transition:color .4s; font-size:.85rem; letter-spacing:.04em; }
.nav-d a:hover, .nav-d a.on { color:var(--ink); }

.hdr-right { display:flex; align-items:center; gap:1rem; }
.lang-btn  { color:var(--muted); transition:color .3s; font-size:.75rem; letter-spacing:.1em; }
.lang-btn:hover { color:var(--ink); }

.ham { display:flex; flex-direction:column; gap:5px; padding:4px; }
.ham span { display:block; width:22px; height:1px; background:var(--ink); transition:transform .4s var(--ease),opacity .3s; }
@media(min-width:768px){ .ham{ display:none; } }

#mob-nav {
  position:fixed; inset:0; z-index:40; background:var(--paper);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2rem;
  transition:opacity .5s var(--ease); pointer-events:none; opacity:0;
}
#mob-nav.open { pointer-events:auto; opacity:1; }
#mob-nav a { font-family:var(--fsr); font-size:1.875rem; font-weight:300; color:var(--ink); }

/* ══ FOOTER ══ */
footer { position:relative; z-index:10; border-top:1px solid var(--line); }
.ftr-in {
  max-width:var(--max); margin-inline:auto;
  padding-inline:1.5rem; padding-block:3rem;
  display:flex; flex-direction:column; gap:2rem;
}
@media(min-width:768px){
  .ftr-in{ flex-direction:row; align-items:flex-end; justify-content:space-between; padding-inline:2.5rem; padding-block:4rem; }
}
.ftr-cta {
  font-family:var(--fsr); font-size:1.5rem; font-weight:300;
  color:var(--ink); display:inline-flex; align-items:center; gap:.6rem;
  transition:opacity .3s;
}
.ftr-cta:hover { opacity:.6; }
.ftr-tag { font-size:.85rem; color:rgba(40,38,35,.55); margin-top:.6rem; }
.ftr-links { display:flex; flex-direction:column; gap:.55rem; }
@media(min-width:768px){ .ftr-links{ align-items:flex-end; } }
.ftr-links a { color:var(--muted); transition:color .3s; font-size:.82rem; letter-spacing:.04em; }
.ftr-links a:hover { color:var(--ink); }
.ftr-copy { color:var(--muted); margin-top:.5rem; font-size:.75rem; }

/* ══ HOME ══ */
.home-hero {
  min-height:100svh;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding-inline:1.5rem; padding-block:7rem 8rem; gap:0;
}
.home-tag {
  font-family:var(--fsr); font-size:clamp(1.3rem,2.5vw,1.75rem); font-weight:300;
  line-height:1.45; text-align:center; max-width:32rem;
  color:var(--ink); margin-bottom:2.5rem;
}

.home-cats {
  display:flex; flex-wrap:wrap; align-items:center; justify-content:center;
  gap:.85rem 1.25rem; margin-bottom:3rem;
}
.home-cats a { color:var(--muted); transition:color .3s; font-size:.78rem; letter-spacing:.12em; text-transform:uppercase; }
.home-cats a:hover, .home-cats a.on { color:var(--ink); }

/* Featured slideshow */
.feat {
  position:relative; overflow:hidden;
  background:rgba(211,202,186,.4);
  cursor:pointer; display:block;
  height:64vw; width:51.2vw;
}
@media(min-width:640px){ .feat{ height:58vw; width:46.4vw; } }
@media(min-width:768px){ .feat{ height:60vh; width:48vh; } }

.feat-slide { position:absolute; inset:0; opacity:0; transition:opacity 1s var(--ease); }
.feat-slide.active { opacity:1; }
.feat-slide img {
  width:100%; height:100%; object-fit:cover; opacity:.84;
  transition:transform 5000ms var(--ease), opacity 1400ms var(--ease);
}
.feat-slide.active img { transform:scale(1.04); }
.feat:hover .feat-slide.active img { opacity:.97; }

.feat-grad {
  position:absolute; inset:0; z-index:1;
  background:linear-gradient(to bottom,rgba(22,19,14,.08),transparent 50%,rgba(22,19,14,.52));
  pointer-events:none;
}
.feat-info {
  position:absolute; inset-inline:0; bottom:0; z-index:2;
  padding-inline:1.5rem; padding-bottom:2rem;
}
@media(min-width:768px){ .feat-info{ padding-inline:2rem; padding-bottom:2.5rem; } }
.feat-cat   { color:rgba(252,251,249,.8); }
.feat-title { font-family:var(--fsr); font-size:1.25rem; font-weight:300; color:var(--paper); margin-top:.35rem; }

.feat-dots {
  position:absolute; inset-inline:0; top:1.25rem; z-index:2;
  display:flex; justify-content:center; gap:.4rem;
}
.feat-dot {
  width:18px; height:1.5px;
  background:rgba(252,251,249,.4);
  transition:background .4s, width .4s var(--ease);
}
.feat-dot.active { background:rgba(252,251,249,.9); width:28px; }

/* Home category strip below slideshow */
.home-strip {
  max-width:var(--max); margin-inline:auto; width:100%;
  padding-inline:1.5rem; padding-block:3.5rem 5rem;
  display:grid; grid-template-columns:1fr 1fr;
  gap:1.5rem;
}
@media(min-width:640px){ .home-strip{ grid-template-columns:repeat(4,1fr); gap:2rem; } }
@media(min-width:768px){ .home-strip{ padding-inline:2.5rem; } }

.hs-card {
  display:block; cursor:pointer;
  border-top:1px solid var(--line); padding-top:1.1rem;
  transition:opacity .3s;
}
.hs-card:hover { opacity:.65; }
.hs-card-img { aspect-ratio:3/4; overflow:hidden; background:rgba(211,202,186,.4); margin-bottom:.85rem; }
.hs-card-img img { width:100%; height:100%; object-fit:cover; transition:transform 1200ms var(--ease); }
.hs-card:hover .hs-card-img img { transform:scale(1.04); }
.hs-cat  { font-size:10px; text-transform:uppercase; letter-spacing:.18em; color:var(--muted); margin-bottom:.35rem; }
.hs-name { font-family:var(--fsr); font-size:1rem; font-weight:300; line-height:1.3; }

/* ══ GALLERY ══ */
.gal-page { padding-top:56px; }
.gal-hdr {
  max-width:var(--max); margin-inline:auto;
  padding-inline:1.5rem; padding-block:4rem 2rem;
}
@media(min-width:768px){ .gal-hdr{ padding-inline:2.5rem; padding-block:7rem 2.5rem; } }
.gal-h1 { font-family:var(--fsr); font-size:3rem; font-weight:200; line-height:1; }
@media(min-width:768px){ .gal-h1{ font-size:4.5rem; } }
.gal-filter {
  display:flex; flex-wrap:wrap; gap:.6rem 1.75rem;
  margin-top:2rem; padding-top:1.5rem; border-top:1px solid var(--line);
}
.gal-filter a { color:var(--muted); transition:color .3s; font-size:.78rem; letter-spacing:.1em; }
.gal-filter a:hover, .gal-filter a.on { color:var(--ink); }

.works-grid {
  max-width:var(--max); margin-inline:auto;
  padding-inline:1.5rem; padding-block:2.5rem 6rem;
  display:grid; grid-template-columns:1fr; gap:1.5rem;
}
@media(min-width:640px){ .works-grid{ grid-template-columns:1fr 1fr; gap:2.5rem; } }
@media(min-width:1024px){ .works-grid{ grid-template-columns:1fr 1fr 1fr; } }
@media(min-width:768px){ .works-grid{ padding-inline:2.5rem; } }

.wcard { display:block; cursor:pointer; }
.wcard-img {
  position:relative; aspect-ratio:4/3;
  overflow:hidden; background:rgba(211,202,186,.35);
}
.wcard-img img {
  width:100%; height:100%; object-fit:cover; opacity:.84;
  transition:transform 1600ms var(--ease),opacity 1400ms var(--ease);
}
.wcard:hover .wcard-img img { transform:scale(1.04); opacity:.97; }
.wcard-info { padding-block:.85rem; display:flex; align-items:flex-start; justify-content:space-between; gap:1rem; }
.wcard-cat   { color:var(--muted); font-size:10px; letter-spacing:.15em; text-transform:uppercase; }
.wcard-title { font-family:var(--fsr); font-size:1.05rem; font-weight:300; margin-top:.2rem; }
.wcard-year  { color:var(--muted); flex-shrink:0; margin-top:.15rem; font-size:.8rem; }

/* ══ WORK DETAIL ══ */
.wd-hero {
  position:relative; width:100%; height:78svh;
  overflow:hidden; background:var(--char);
}
@media(min-width:768px){ .wd-hero{ height:88svh; } }
.wd-hero-img { position:absolute; inset:0; }
.wd-hero-img img { width:100%; height:100%; object-fit:cover; opacity:.84; }
.wd-grad {
  position:absolute; inset:0;
  background:linear-gradient(to bottom,rgba(22,19,14,.2),transparent 45%,rgba(22,19,14,.5));
}
.wd-btm {
  position:absolute; inset-inline:0; bottom:0;
  padding-inline:1.5rem; padding-bottom:3rem;
  max-width:var(--max); margin-inline:auto;
}
@media(min-width:768px){ .wd-btm{ padding-inline:2.5rem; padding-bottom:4rem; } }
.wd-bread { color:rgba(252,251,249,.8); font-size:.75rem; letter-spacing:.15em; text-transform:uppercase; }
.wd-htitle {
  font-family:var(--fsr); font-weight:200; line-height:1;
  color:var(--paper); margin-top:1rem; font-size:2.25rem;
}
@media(min-width:768px){ .wd-htitle{ font-size:4.5rem; } }

.wd-body {
  max-width:var(--max); margin-inline:auto;
  padding-inline:1.5rem; padding-block:4rem 2rem;
}
@media(min-width:768px){ .wd-body{ padding-inline:2.5rem; padding-block:7rem 2.5rem; } }

.wd-back {
  display:inline-flex; align-items:center; gap:.4rem;
  color:var(--muted); margin-bottom:2.5rem; transition:color .3s; font-size:.82rem;
}
.wd-back:hover { color:var(--ink); }

.wd-meta {
  display:flex; flex-wrap:wrap; gap:1.5rem 3rem;
  padding-bottom:2.5rem; border-bottom:1px solid var(--line);
}
.wd-mk { color:var(--muted); margin-bottom:.35rem; font-size:.75rem; letter-spacing:.12em; text-transform:uppercase; }
.wd-mv { font-family:var(--fsr); font-size:1.1rem; font-weight:300; }

.wd-grid { display:grid; grid-template-columns:1fr; gap:2.5rem; margin-top:2.5rem; }
@media(min-width:768px){
  .wd-grid{ grid-template-columns:repeat(12,1fr); gap:0 4rem; }
  .wd-c4{ grid-column:span 4; }
  .wd-c8{ grid-column:span 8; }
}
.wd-desc {
  font-family:var(--fsr); font-weight:300; line-height:1.65;
  color:rgba(40,38,35,.85); font-size:1.4rem;
}
@media(min-width:768px){ .wd-desc{ font-size:1.75rem; } }

.btn-inq {
  display:inline-flex; align-items:center; gap:.5rem;
  margin-top:2rem; border:1px solid var(--line);
  padding:.85rem 1.75rem; color:var(--ink); font-size:.8rem; letter-spacing:.1em; text-transform:uppercase;
  transition:background .4s,color .4s,border-color .4s;
}
.btn-inq:hover { background:var(--ink); color:var(--paper); border-color:var(--ink); }

.wd-gal-wrap {
  max-width:var(--max); margin-inline:auto;
  padding-inline:1.5rem; padding-block:1.5rem 0;
}
@media(min-width:768px){ .wd-gal-wrap{ padding-inline:2.5rem; } }
.wd-gal { display:grid; grid-template-columns:1fr; gap:1.5rem; }
@media(min-width:640px){ .wd-gal{ grid-template-columns:1fr 1fr; } }
@media(min-width:768px){ .wd-gal{ gap:2.5rem; } }
.wd-gi { position:relative; overflow:hidden; background:rgba(211,202,186,.3); aspect-ratio:4/3; }
.wd-gi.wide { grid-column:1/-1; aspect-ratio:16/7; }
.wd-gi img  { width:100%; height:100%; object-fit:cover; }

.wd-next {
  position:relative; display:block; width:100%; overflow:hidden;
  height:52svh; background:var(--char); margin-top:2.5rem; cursor:pointer;
}
@media(min-width:768px){ .wd-next{ height:64svh; } }
.wd-next-img { position:absolute; inset:0; }
.wd-next-img img { width:100%; height:100%; object-fit:cover; opacity:.7; }
.wd-next-grad {
  position:absolute; inset:0;
  background:linear-gradient(to bottom,rgba(22,19,14,.65),rgba(22,19,14,0) 40%,rgba(22,19,14,.75));
}
.wd-next-cnt {
  position:absolute; inset:0;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  text-align:center; color:var(--paper); padding:2rem;
}
.wd-next-lbl { color:rgba(252,251,249,.8); font-size:.75rem; letter-spacing:.15em; text-transform:uppercase; }
.wd-next-ttl { font-family:var(--fsr); font-weight:200; font-size:2.25rem; line-height:1.1; margin-top:1rem; }
@media(min-width:768px){ .wd-next-ttl{ font-size:3.75rem; } }
.wd-next-arr { display:flex; align-items:center; gap:.5rem; margin-top:1.25rem; color:rgba(252,251,249,.8); font-size:.78rem; letter-spacing:.1em; }

/* ══ ABOUT ══ */
.ab-page { padding-top:56px; }
.ab-hero {
  position:relative; width:100%; height:60svh;
  overflow:hidden; background:var(--char);
}
@media(min-width:768px){ .ab-hero{ height:72svh; } }
.ab-hero img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; opacity:.72; }
.ab-hero-grad {
  position:absolute; inset:0;
  background:linear-gradient(to bottom,rgba(22,19,14,.1),transparent 40%,rgba(22,19,14,.65));
}
.ab-hero-txt {
  position:absolute; inset-inline:0; bottom:0;
  padding-inline:1.5rem; padding-bottom:3rem;
  max-width:var(--max); margin-inline:auto;
}
@media(min-width:768px){ .ab-hero-txt{ padding-inline:2.5rem; padding-bottom:4rem; } }
.ab-hero-h { font-family:var(--fsr); font-size:clamp(2rem,5vw,3.5rem); font-weight:200; color:var(--paper); line-height:1.1; }

.ab-wrap {
  max-width:var(--max); margin-inline:auto;
  padding-inline:1.5rem; padding-block:5rem 4rem;
}
@media(min-width:768px){ .ab-wrap{ padding-inline:2.5rem; padding-block:7rem 6rem; } }
.ab-grid { display:grid; grid-template-columns:1fr; gap:3rem; }
@media(min-width:768px){
  .ab-grid{ grid-template-columns:repeat(12,1fr); gap:4rem; }
  .ab-c5{ grid-column:span 5; }
  .ab-c7{ grid-column:span 7; }
}

.ab-img-stack { position:relative; }
.ab-img-main { aspect-ratio:4/5; overflow:hidden; background:rgba(211,202,186,.4); }
.ab-img-main img { width:100%; height:100%; object-fit:cover; }
.ab-img-accent {
  position:absolute; width:55%; aspect-ratio:1;
  overflow:hidden; background:rgba(211,202,186,.5);
  bottom:-1.5rem; inset-inline-start:-1.25rem;
  border:4px solid var(--paper);
}
.ab-img-accent img { width:100%; height:100%; object-fit:cover; }

.ab-eye { color:var(--muted); font-size:.75rem; letter-spacing:.18em; text-transform:uppercase; }
.ab-h1 {
  font-family:var(--fsr); font-weight:300; line-height:1.25;
  margin-top:1.25rem; font-size:clamp(1.65rem,3vw,2.5rem);
}
.ab-body {
  margin-top:2rem; display:flex; flex-direction:column; gap:1.4rem;
  font-family:var(--fsr); font-size:1rem; line-height:1.75;
  color:rgba(40,38,35,.78);
}
.ab-divider { border-top:1px solid var(--line); margin-block:2.5rem; }
.ab-list { display:flex; flex-direction:column; gap:.9rem; }
.ab-list-item {
  display:flex; align-items:flex-start; gap:1rem;
  padding-bottom:.9rem; border-bottom:1px solid var(--line);
}
.ab-list-item:last-child { border-bottom:none; }
.ab-list-num { font-family:var(--fsr); font-size:.9rem; color:var(--muted); flex-shrink:0; min-width:1.5rem; }
.ab-list-txt { font-family:var(--fsr); font-size:1rem; font-weight:300; line-height:1.5; }
.ab-cta-wrap { margin-top:3rem; display:flex; flex-wrap:wrap; gap:1rem; align-items:center; }
.btn-cta {
  display:inline-flex; align-items:center; gap:.5rem;
  background:var(--ink); color:var(--paper);
  padding:.9rem 2rem; font-size:.78rem; letter-spacing:.1em; text-transform:uppercase;
  transition:background .4s,color .4s;
}
.btn-cta:hover { background:rgba(40,38,35,.8); }
.btn-cta-out {
  display:inline-flex; align-items:center; gap:.5rem;
  border:1px solid var(--line); padding:.9rem 2rem;
  color:var(--ink); font-size:.78rem; letter-spacing:.1em; text-transform:uppercase;
  transition:background .4s,color .4s,border-color .4s;
}
.btn-cta-out:hover { background:var(--ink); color:var(--paper); border-color:var(--ink); }

/* ══ WORKSHOPS ══ */
.ws-page { padding-top:56px; }
.ws-wrap {
  max-width:var(--max); margin-inline:auto;
  padding-inline:1.5rem; padding-block:6rem;
}
@media(min-width:768px){ .ws-wrap{ padding-inline:2.5rem; padding-block:11rem 8rem; } }
.ws-h1 { font-family:var(--fsr); font-weight:200; line-height:1; font-size:clamp(2.5rem,5vw,4.5rem); }
.ws-intro {
  margin-top:1.25rem; max-width:34rem;
  font-family:var(--fsr); font-size:1.1rem; font-weight:300;
  line-height:1.65; color:rgba(40,38,35,.7);
}
.ws-list { margin-top:4rem; border-top:1px solid var(--line); }
.ws-row {
  padding-block:2.25rem; border-bottom:1px solid var(--line);
  display:grid; grid-template-columns:1fr; gap:1.5rem;
}
@media(min-width:768px){
  .ws-row{ grid-template-columns:repeat(12,1fr); gap:2rem 4rem; padding-block:2.75rem; align-items:start; }
  .wsr-l{ grid-column:span 7; }
  .wsr-r{ grid-column:span 5; display:flex; flex-direction:column; align-items:flex-end; gap:1rem; }
  html[dir="rtl"] .wsr-r{ align-items:flex-start; }
}
.wsr-type { color:var(--muted); margin-bottom:.5rem; font-size:.75rem; letter-spacing:.15em; text-transform:uppercase; }

/* ══ LANGUAGE ══ */
const HL = document.documentElement;
let lang = localStorage.getItem('rc-lang') || 'he';

function applyLang(l) {
  lang = l;
  HL.setAttribute('lang', l);
  HL.setAttribute('dir', l === 'he' ? 'rtl' : 'ltr');
  localStorage.setItem('rc-lang', l);
  document.querySelectorAll('[data-he]').forEach(el => el.style.display = l==='he' ? '' : 'none');
  document.querySelectorAll('[data-en]').forEach(el => el.style.display = l==='en' ? '' : 'none');
}
function T(he, en) { return lang === 'he' ? he : en; }

document.getElementById('lang-btn').addEventListener('click', () => {
  applyLang(lang === 'he' ? 'en' : 'he');
  route();
});

/* ══ MOBILE MENU ══ */
const mobNav = document.getElementById('mob-nav');
const hamBtn = document.getElementById('ham-btn');
function closeMob() {
  mobNav.classList.remove('open');
  hamBtn.setAttribute('aria-expanded','false');
  document.body.style.overflow = '';
}
hamBtn.addEventListener('click', () => {
  const o = mobNav.classList.toggle('open');
  hamBtn.setAttribute('aria-expanded', String(o));
  document.body.style.overflow = o ? 'hidden' : '';
});
document.querySelectorAll('[data-nav]').forEach(a => a.addEventListener('click', closeMob));

/* ══ ROUTER ══ */
const app = document.getElementById('app');
function navigate(path) { location.hash = path; }

function route() {
  const hash  = location.hash.replace('#','') || '/';
  const parts = hash.split('/').filter(Boolean);
  const page  = parts[0] || '';
  const sub   = parts[1] || '';

  document.querySelectorAll('.nav-d a').forEach(a => {
    const h = a.getAttribute('href').replace('#/','');
    a.classList.toggle('on', h === page || (h==='gallery' && page==='gallery'));
  });

  let html;
  if (!page)               html = buildHome();
  else if (page==='gallery') html = buildGallery(sub);
  else if (page==='work' && sub) {
    const w = AW.find(a => a.slug === sub);
    html = w ? buildWork(w) : buildHome();
  }
  else if (page==='about')     html = buildAbout();
  else if (page==='workshops') html = buildWorkshops();
  else if (page==='contact')   html = buildContact();
  else html = buildHome();

  app.classList.add('fade');
  setTimeout(() => {
    app.innerHTML = html;
    app.classList.remove('fade');
    window.scrollTo(0, 0);
    applyLang(lang);
    bindEvents();
  }, 180);
}

function bindEvents() {
  if (_slideTimer) { clearInterval(_slideTimer); _slideTimer = null; }

  app.querySelectorAll('[data-slug]').forEach(el => {
    el.addEventListener('click', () => navigate('#/work/' + el.dataset.slug));
    el.addEventListener('keydown', e => { if(e.key==='Enter'||e.key===' ') navigate('#/work/'+el.dataset.slug); });
  });
  app.querySelectorAll('[data-cat]').forEach(el => {
    el.addEventListener('click', e => { e.preventDefault(); navigate('#/gallery/' + el.dataset.cat); });
  });
  const f = app.querySelector('form[data-cf]');
  if (f) f.addEventListener('submit', e => { e.preventDefault(); alert(T('תודה! ניצור איתך קשר בקרוב.','Thank you! We\'ll be in touch soon.')); });

function startSlideshow() {
  if (_slideTimer) clearInterval(_slideTimer);
  _slideIdx = 0;
  _slideTimer = setInterval(advanceSlide, 3800);
}

function advanceSlide() {
  const slides = document.querySelectorAll('.feat-slide');
  const dots   = document.querySelectorAll('.feat-dot');
  const catEl  = document.getElementById('feat-cat');
  const card   = document.getElementById('feat-card');
  if (!slides.length) return;

  slides[_slideIdx].classList.remove('active');
  dots[_slideIdx].classList.remove('active');
  _slideIdx = (_slideIdx + 1) % HERO_IMGS.length;
  slides[_slideIdx].classList.add('active');
  dots[_slideIdx].classList.add('active');

  const h = HERO_IMGS[_slideIdx];
  if (catEl) catEl.innerHTML = `<span>${lang==='he' ? h.tHe : h.tEn}</span>`;
  if (card)  card.dataset.slug = h.slug;
}
